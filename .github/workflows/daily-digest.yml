name: Create daily developer digest

on:
  schedule:
    - cron: "0 7 * * 1-5"
      timezone: "Africa/Johannesburg"
  workflow_dispatch:
    inputs:
      date:
        description: "Digest date (YYYY-MM-DD). Defaults to today in Johannesburg."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-developer-digest
  cancel-in-progress: false

jobs:
  create-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare digest date
        id: prepare
        env:
          REQUESTED_DATE: ${{ inputs.date }}
        run: |
          if [ -n "$REQUESTED_DATE" ]; then
            DIGEST_DATE="$REQUESTED_DATE"
          else
            DIGEST_DATE="$(TZ=Africa/Johannesburg date +%F)"
          fi

          if ! [[ "$DIGEST_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid digest date: $DIGEST_DATE"
            exit 1
          fi

          if [ "$(date -u -d "$DIGEST_DATE" +%F 2>/dev/null)" != "$DIGEST_DATE" ]; then
            echo "Invalid calendar date: $DIGEST_DATE"
            exit 1
          fi

          DIGEST_FILE="src/content/blog/$DIGEST_DATE-digest.md"
          DIGEST_BRANCH="automation/digest-$DIGEST_DATE"

          if [ -e "$DIGEST_FILE" ]; then
            echo "$DIGEST_FILE already exists."
            exit 1
          fi

          if git ls-remote --exit-code --heads origin "$DIGEST_BRANCH" >/dev/null 2>&1; then
            echo "$DIGEST_BRANCH already exists. Review or remove the existing branch."
            exit 1
          fi

          echo "date=$DIGEST_DATE" >> "$GITHUB_OUTPUT"
          echo "file=$DIGEST_FILE" >> "$GITHUB_OUTPUT"
          echo "branch=$DIGEST_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Generate draft digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPEN_API_KEY: ${{ secrets.OPEN_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          DIGEST_DATE: ${{ steps.prepare.outputs.date }}
        run: |
          node scripts/generate-digest.mjs --date "$DIGEST_DATE"

      - name: Validate site
        run: npm run build

      - name: Create branch and commit
        id: commit
        env:
          DIGEST_DATE: ${{ steps.prepare.outputs.date }}
          DIGEST_FILE: ${{ steps.prepare.outputs.file }}
          DIGEST_BRANCH: ${{ steps.prepare.outputs.branch }}
        run: |
          if [ ! -f "$DIGEST_FILE" ]; then
            echo "$DIGEST_FILE was not created."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$DIGEST_BRANCH"
          git add "$DIGEST_FILE"
          git commit -m "content: add $DIGEST_DATE developer digest draft"
          git push --set-upstream origin "$DIGEST_BRANCH"

          echo "date=$DIGEST_DATE" >> "$GITHUB_OUTPUT"
          echo "branch=$DIGEST_BRANCH" >> "$GITHUB_OUTPUT"
          echo "file=$DIGEST_FILE" >> "$GITHUB_OUTPUT"

      - name: Open draft pull request
        env:
          GH_TOKEN: ${{ github.token }}
          DIGEST_DATE: ${{ steps.commit.outputs.date }}
          DIGEST_BRANCH: ${{ steps.commit.outputs.branch }}
          DIGEST_FILE: ${{ steps.commit.outputs.file }}
        run: |
          gh pr create \
            --draft \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$DIGEST_BRANCH" \
            --title "Developer digest: $DIGEST_DATE" \
            --body "$(cat <<EOF
          ## Daily digest draft

          Generated \`$DIGEST_FILE\` with \`draft: true\`.

          Before publishing:

          - Proofread the article and verify its source links.
          - Make any editorial changes in this pull request.
          - Change \`draft: true\` to \`draft: false\`.
          - Run or confirm the Astro build.
          - Mark this pull request ready and merge it.

          The digest remains hidden from the public blog until \`draft\` is set to \`false\` and this pull request is merged.
          EOF
          )"
